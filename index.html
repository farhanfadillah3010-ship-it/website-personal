<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Pink Memories</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
            color: #5d4037;
            min-height: 100vh;
            overflow-x: hidden;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="%23d81b60"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>'), auto;
        }

        /* Navigasi */
        nav {
            display: flex;
            justify-content: center;
            padding: 20px 0;
            gap: 25px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 15px rgba(216, 27, 96, 0.1);
        }

        nav a {
            color: rgba(93, 64, 55, 0.8);
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            padding: 5px 10px;
            transition: 0.3s;
        }

        nav a.active {
            color: #d81b60;
            font-weight: bold;
            border-bottom: 2px solid #d81b60;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .page {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .page.active-page {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Counter */
        .counter-container {
            background: white;
            padding: 25px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin: 30px 0;
            border: 2px dashed #ffafbd;
        }
        .counter-time { font-size: 22px; font-weight: bold; color: #d81b60; margin-top: 10px; }

        /* Music Player Float */
        .music-player {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2000;
            background: white;
            padding: 10px 15px;
            border-radius: 50px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .music-btn {
            background: #d81b60; color: white; border: none;
            width: 40px; height: 40px; border-radius: 50%;
            cursor: pointer; font-size: 16px; transition: 0.3s;
        }

        /* Hearts */
        .click-heart { position: absolute; color: #d81b60; font-size: 20px; user-select: none; pointer-events: none; animation: heartFloat 1s ease-out forwards; z-index: 9999; }
        @keyframes heartFloat { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-50px) scale(1.5); opacity: 0; } }
    </style>
</head>
<body onclick="handleFirstClick(event)">

    <!-- MUSIC PLAYER -->
    <div class="music-player">
        <button class="music-btn" id="play-pause" onclick="toggleMusic(event)">▶</button>
        <div style="display: flex; flex-direction: column;">
            <span style="font-size: 11px; color: #888;">Now Playing</span>
            <span style="font-size: 13px; font-weight: bold;">Aku Milikmu - Dewa 19</span>
        </div>
        <audio id="myAudio" loop preload="auto">
            <source src="akumilikmu.mp3" type="audio/mpeg">
        </audio>
    </div>

    <nav>
        <a onclick="showPage('home')" id="nav-home" class="active">Home</a>
        <a onclick="showPage('memories')" id="nav-memories">Memories</a>
        <a onclick="showPage('message')" id="nav-message">Message</a>
    </nav>

    <div class="container">
        <!-- HOME PAGE -->
        <div id="home" class="page active-page">
            <h2 style="text-align: center; color: #ad1457;">Welcome Home 🌸</h2>
            <div class="counter-container">
                <p style="margin: 0; font-size: 14px; color: #888;">Waktu Bersama:</p>
                <div id="days-counter" class="counter-time">Loading...</div>
            </div>
        </div>

        <div id="memories" class="page">
            <h2 style="text-align: center; color: #ad1457;">🌸 Our Memories 🌸</h2>
            <p style="text-align: center;">Halaman kenangan kita...</p>
        </div>

        <div id="message" class="page">
            <h2 style="text-align: center; color: #ad1457;">💌 Message Board 💌</h2>
            <p style="text-align: center;">Tulis pesanmu di sini...</p>
        </div>
    </div>

    <script>
        const audio = document.getElementById("myAudio");
        const btn = document.getElementById("play-pause");
        let isStarted = false;

        // Fungsi pemicu utama (Autoplay)
        function handleFirstClick(e) {
            spawnHeart(e); // Efek hati
            startMusic();
        }

        function startMusic() {
            if (!isStarted) {
                audio.play().then(() => {
                    btn.innerHTML = "⏸";
                    isStarted = true;
                }).catch(error => {
                    console.log("Menunggu interaksi pengguna untuk memutar musik...");
                });
            }
        }

        function showPage(pageId) {
            // Memastikan musik jalan saat pindah menu
            startMusic();

            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(pageId).classList.add('active-page');
            document.getElementById('nav-' + pageId).classList.add('active');
            window.scrollTo(0, 0);
        }

        function toggleMusic(e) {
            e.stopPropagation(); // Mencegah pemicu double dari handleFirstClick
            if (audio.paused) {
                audio.play();
                btn.innerHTML = "⏸";
                isStarted = true;
            } else {
                audio.pause();
                btn.innerHTML = "▶";
            }
        }

        function spawnHeart(e) {
            const heart = document.createElement('div');
            heart.className = 'click-heart';
            heart.innerHTML = '❤️';
            heart.style.left = e.pageX + 'px';
            heart.style.top = e.pageY + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        }

        function updateCounter() {
            const startDate = new Date("2024-01-01"); 
            const diff = new Date() - startDate;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("days-counter").innerHTML = `${d} Hari Bersama`;
        }
        setInterval(updateCounter, 1000);
        updateCounter();
    </script>
</body>
</html>
