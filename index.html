<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Pink Memories</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
            color: #5d4037; min-height: 100vh; overflow-x: hidden;
        }

        /* Navigasi */
        nav {
            display: flex; justify-content: center; padding: 20px 0; gap: 25px;
            background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000;
        }

        nav a {
            color: rgba(93, 64, 55, 0.8); text-decoration: none;
            font-size: 16px; font-weight: 500; cursor: pointer;
        }

        nav a.active { color: #d81b60; font-weight: bold; border-bottom: 2px solid #d81b60; }

        .container { max-width: 800px; margin: 0 auto; padding: 20px; text-align: center; }

        /* Counter Box */
        .counter-container {
            background: white; padding: 25px; border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin: 30px 0;
            border: 2px dashed #ffafbd;
        }
        .counter-time { font-size: 22px; font-weight: bold; color: #d81b60; margin-top: 10px; }

        /* Floating Music Info */
        .music-player {
            position: fixed; bottom: 20px; right: 20px; z-index: 2000;
            background: white; padding: 10px 20px; border-radius: 50px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 10px;
        }

        /* Efek Hati */
        .click-heart { position: absolute; color: #d81b60; font-size: 20px; pointer-events: none; animation: heartFloat 1s ease-out forwards; }
        @keyframes heartFloat { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-50px); opacity: 0; } }
    </style>
</head>
<body onclick="playMusic()">

    <!-- YOUTUBE PLAYER (Tersembunyi) -->
    <!-- ID 'gT9g1cW1H-4' adalah lagu Aku Milikmu - Dewa 19 -->
    <div id="youtube-container" style="display:none;">
        <div id="player"></div>
    </div>

    <!-- TAMPILAN PEMUTAR MUSIK -->
    <div class="music-player">
        <div style="font-size: 20px;">🎵</div>
        <div style="display: flex; flex-direction: column; align-items: flex-start;">
            <span style="font-size: 10px; color: #888;">Now Playing</span>
            <span style="font-size: 13px; font-weight: bold; color: #d81b60;">Aku Milikmu - Dewa 19</span>
        </div>
    </div>

    <nav>
        <a onclick="showPage('home')" id="nav-home" class="active">Home</a>
        <a onclick="showPage('memories')" id="nav-memories">Memories</a>
        <a onclick="showPage('message')" id="nav-message">Message</a>
    </nav>

    <div class="container">
        <div id="home" class="page active-page">
            <h2 style="color: #ad1457;">Welcome Home 🌸</h2>
            <div class="counter-container">
                <p style="margin: 0; font-size: 14px; color: #888;">Waktu Bersama:</p>
                <div id="days-counter" class="counter-time">Loading...</div>
            </div>
            <p style="font-size: 12px; color: #d81b60;">(Ketuk di mana saja untuk memutar musik ✨)</p>
        </div>

        <div id="memories" class="page" style="display:none;">
            <h2 style="color: #ad1457;">🌸 Our Memories 🌸</h2>
            <p>Halaman kenangan kita...</p>
        </div>

        <div id="message" class="page" style="display:none;">
            <h2 style="color: #ad1457;">💌 Message Board 💌</h2>
            <p>Tulis pesanmu di sini...</p>
        </div>
    </div>

    <script>
        // 1. Load YouTube IFrame Player API
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        var musicStarted = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0',
                width: '0',
                videoId: 'gT9g1cW1H-4', // ID Lagu Aku Milikmu
                playerVars: {
                    'autoplay': 1,
                    'loop': 1,
                    'playlist': 'gT9g1cW1H-4'
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            // Player siap, tapi menunggu klik pertama pengguna
        }

        // Fungsi pemicu musik (Autoplay lewat interaksi)
        function playMusic() {
            if (player && !musicStarted) {
                player.playVideo();
                musicStarted = true;
            }
            // Munculkan efek hati
            spawnHeart(event);
        }

        function showPage(pageId) {
            playMusic(); // Pastikan musik jalan saat menu diklik
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(pageId).style.display = 'block';
            document.getElementById('nav-' + pageId).classList.add('active');
        }

        function spawnHeart(e) {
            const heart = document.createElement('div');
            heart.className = 'click-heart';
            heart.innerHTML = '❤️';
            heart.style.left = e.pageX + 'px';
            heart.style.top = e.pageY + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        }

        function updateCounter() {
            const startDate = new Date("2024-01-01"); 
            const diff = new Date() - startDate;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("days-counter").innerHTML = `${d} Hari Bersama`;
        }
        setInterval(updateCounter, 1000);
        updateCounter();
    </script>
</body>
</html>
