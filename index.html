<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Tombol</title>
</head>
<body style="background: pink; text-align: center; padding-top: 50px;">

    <h2>Klik untuk Putar Lagu 🌸</h2>
    <button id="btnMulai" style="padding: 20px; font-size: 20px; border-radius: 10px;">
        Mulai Sekarang ✨
    </button>

    <div id="player"></div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.body.appendChild(tag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0', width: '0',
                videoId: 'gT9g1cW1H-4',
                playerVars: { 'autoplay': 0, 'loop': 1, 'playlist': 'gT9g1cW1H-4' }
            });
        }

        document.getElementById('btnMulai').onclick = function() {
            if(player) {
                player.playVideo();
                alert("Lagu Harusnya Sudah Mulai!");
                this.style.display = 'none';
            }
        };
    </script>
</body>
</html>
