<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Pink Memories</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
            min-height: 100vh; text-align: center; color: #5d4037;
        }

        /* Navigasi */
        nav {
            display: flex; justify-content: center; padding: 15px 0; gap: 20px;
            background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000;
        }

        nav a { color: #5d4037; text-decoration: none; font-weight: 500; cursor: pointer; }

        /* Welcome Overlay (Pemicu Musik) */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 175, 189, 0.95);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 9999; transition: 0.5s;
        }

        .play-btn {
            background: #d81b60; color: white; border: none;
            padding: 15px 30px; border-radius: 50px; font-size: 18px;
            box-shadow: 0 4px 15px rgba(216, 27, 96, 0.4); cursor: pointer;
        }

        .counter-container {
            background: white; padding: 25px; border-radius: 20px;
            margin: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <!-- TOMBOL PEMICU (WAJIB UNTUK HP) -->
    <div id="overlay">
        <h2 style="color: white; margin-bottom: 20px;">Welcome Home 🌸</h2>
        <button class="play-btn" onclick="startEverything()">Mulai Kenangan ✨</button>
    </div>

    <!-- PLAYER YOUTUBE TERSEMBUNYI -->
    <div id="youtube-player" style="display:none;">
        <div id="player"></div>
    </div>

    <nav>
        <a onclick="showPage('home')">Home</a>
        <a onclick="showPage('memories')">Memories</a>
    </nav>

    <div class="container">
        <div id="home" class="page">
            <div class="counter-container">
                <p>Waktu Bersama:</p>
                <div id="days-counter" style="font-size: 22px; font-weight: bold; color: #d81b60;">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        // Load YouTube API
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.body.appendChild(tag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0', width: '0',
                videoId: 'gT9g1cW1H-4', // ID Lagu Aku Milikmu
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'gT9g1cW1H-4' }
            });
        }

        function startEverything() {
            // Hilangkan overlay
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => { document.getElementById('overlay').style.display = 'none'; }, 500);
            
            // Putar Musik
            if (player) { player.playVideo(); }
            
            updateCounter();
        }

        function updateCounter() {
            const startDate = new Date("2024-01-01"); 
            const diff = new Date() - startDate;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("days-counter").innerHTML = `${d} Hari Bersama`;
        }
        setInterval(updateCounter, 1000);
    </script>
</body>
</html>
