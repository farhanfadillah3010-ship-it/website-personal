<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Pink Memories</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
            color: #5d4037; min-height: 100vh; overflow-x: hidden;
            padding-bottom: 90px;
        }

        /* Navigasi */
        nav {
            display: flex; justify-content: center; padding: 15px 0; gap: 15px;
            background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 2px 15px rgba(216, 27, 96, 0.1);
        }

        nav a {
            color: rgba(93, 64, 55, 0.8); text-decoration: none;
            font-size: 15px; font-weight: 500; cursor: pointer;
            padding: 5px 10px; transition: 0.3s;
        }

        nav a.active { color: #d81b60; font-weight: bold; border-bottom: 2px solid #d81b60; }

        .container { max-width: 500px; margin: 0 auto; padding: 20px; }

        .page { display: none; animation: fadeIn 0.5s ease; }
        .page.active-page { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Counter */
        .counter-container {
            background: white; padding: 25px; border-radius: 25px;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin: 30px 0; border: 2px dashed #ffafbd;
        }
        .counter-time { font-size: 24px; font-weight: bold; color: #d81b60; margin-top: 10px; }

        /* Card Foto Memories & Gallery */
        .card-foto {
            background: white; padding: 12px; border-radius: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08); margin-bottom: 20px;
        }
        .card-foto img { width: 100%; border-radius: 18px; display: block; }

        /* Gallery Grid (2 Kolom) */
        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 15px; }
        .gallery-item { background: white; padding: 8px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .gallery-item img { width: 100%; border-radius: 10px; display: block; }

        /* Form Message Board Baru & Estetik */
        .message-form {
            background: rgba(255, 255, 255, 0.9);
            padding: 25px; border-radius: 24px;
            box-shadow: 0 15px 35px rgba(216, 27, 96, 0.1);
            margin-bottom: 30px;
            display: flex; flex-direction: column; gap: 15px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
        }
        .message-form input, .message-form textarea {
            width: 100%; padding: 14px; border: 2px solid #ffe3e8;
            border-radius: 16px; font-family: inherit; font-size: 14px;
            outline: none; box-sizing: border-box; transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
        }
        .message-form input:focus, .message-form textarea:focus {
            border-color: #ffafbd;
            background: white;
            box-shadow: 0 0 10px rgba(255, 175, 189, 0.5);
        }
        .btn-kirim {
            background: linear-gradient(135deg, #d81b60 0%, #ff4081 100%);
            color: white; border: none; padding: 14px;
            border-radius: 16px; font-weight: bold; font-size: 15px;
            cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(216, 27, 96, 0.2);
        }
        .btn-kirim:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(216, 27, 96, 0.3);
        }
        .btn-kirim:active { transform: translateY(0); }

        /* Daftar Pesan */
        .msg-list { display: flex; flex-direction: column; gap: 15px; }
        
        /* Animasi Pesan Masuk */
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        /* Animasi Pesan Keluar */
        @keyframes popOut {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.9) translateY(-10px); height: 0; padding: 0; margin: 0; border: none; }
        }

        .msg-box {
            background: white; padding: 18px; border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04); text-align: left;
            position: relative; border-left: 5px solid #d81b60;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transition: all 0.4s ease;
        }
        
        .msg-box.removing {
            animation: popOut 0.4s ease forwards;
        }

        .msg-name { font-weight: bold; color: #d81b60; font-size: 14px; display: block; margin-bottom: 5px;}
        .msg-text { margin: 0; font-size: 14px; color: #5d4037; line-height: 1.5; }
        
        /* Tombol Hapus Cantik */
        .btn-delete {
            position: absolute; right: 15px; top: 15px;
            background: #fff0f3; color: #e91e63; border: none;
            width: 30px; height: 30px; border-radius: 50%; font-size: 12px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease;
        }
        .btn-delete:hover {
            background: #e91e63; color: white;
            transform: scale(1.1);
        }

        /* Pemutar Musik di Bawah Tengah */
        .music-player {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 2000; background: white; padding: 8px 20px;
            border-radius: 50px; box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: flex; align-items: center; gap: 12px; width: max-content;
        }
        .music-btn {
            background: #d81b60; color: white; border: none;
            width: 36px; height: 36px; border-radius: 50%;
            cursor: pointer; font-size: 14px; display: flex;
            align-items: center; justify-content: center;
        }

        /* Hati Terbang */
        .click-heart { position: absolute; color: #d81b60; font-size: 20px; user-select: none; pointer-events: none; animation: heartFloat 1.2s ease-out forwards; z-index: 9999; }
        @keyframes heartFloat { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-70px) scale(1.6); opacity: 0; } }
    </style>
</head>
<body onclick="handleFirstClick(event)">

    <div id="player-container"></div>

    <div class="music-player">
        <button class="music-btn" id="play-pause" onclick="toggleMusic(event)">▶</button>
        <div style="display: flex; flex-direction: column;">
            <span style="font-size: 9px; color: #888; text-transform: uppercase;">Now Playing</span>
            <span style="font-size: 12px; font-weight: bold; color: #5d4037;">Aku Milikmu - Dewa 19</span>
        </div>
    </div>

    <nav>
        <a onclick="showPage('home')" id="nav-home" class="active">Home</a>
        <a onclick="showPage('memories')" id="nav-memories">Memories</a>
        <a onclick="showPage('gallery')" id="nav-gallery">Gallery</a>
        <a onclick="showPage('message')" id="nav-message">Message</a>
    </nav>

    <div class="container">
        <div id="home" class="page active-page">
            <h2 style="text-align: center; color: #ad1457;">Welcome Home 🌸</h2>
            <div class="counter-container">
                <p style="margin: 0; font-size: 14px; color: #888;">Waktu Yang Kita Jalani:</p>
                <div id="days-counter" class="counter-time">Mengitung...</div>
            </div>
        </div>

        <div id="memories" class="page">
            <h2 style="text-align: center; color: #ad1457;">🌸 Our Memories 🌸</h2>
            <div class="card-foto">
                <img src="foto_bersama1.jpg" alt="Foto Bersama 1">
            </div>
            <div class="card-foto">
                <img src="foto_bersama2.jpg" alt="Foto Bersama 2">
            </div>
        </div>

        <div id="gallery" class="page">
            <h2 style="text-align: center; color: #ad1457;">✨ Photo Gallery ✨</h2>
            <div class="gallery-grid">
                <div class="gallery-item"><img src="galeri1.jpg" alt="Galeri 1"></div>
                <div class="gallery-item"><img src="galeri2.jpg" alt="Galeri 2"></div>
                <div class="gallery-item"><img src="galeri3.jpg" alt="Galeri 3"></div>
                <div class="gallery-item"><img src="galeri4.jpg" alt="Galeri 4"></div>
            </div>
        </div>

        <div id="message" class="page">
            <h2 style="text-align: center; color: #ad1457;">💌 Message Board 💌</h2>
            
            <div class="message-form">
                <input type="text" id="inputNama" placeholder="Siapa namamu? ✨" required>
                <textarea id="inputPesan" rows="3" placeholder="Tulis pesan manis di sini... 💖" required></textarea>
                <button class="btn-kirim" onclick="kirimPesan()">Kirim Pesan ✨</button>
            </div>

            <div class="msg-list" id="daftarPesan">
                </div>
        </div>
    </div>

    <script>
        // YouTube API Setup
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        var musicStarted = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player-container', {
                height: '0', width: '0',
                videoId: 'gT9g1cW1H-4',
                playerVars: {
                    'autoplay': 1,
                    'loop': 1,
                    'playlist': 'gT9g1cW1H-4'
                }
            });
        }

        function handleFirstClick(e) {
            spawnHeart(e);
            if (player && !musicStarted) {
                player.playVideo();
                document.getElementById('play-pause').innerHTML = "⏸";
                musicStarted = true;
            }
        }

        function toggleMusic(e) {
            e.stopPropagation();
            if (player) {
                var state = player.getPlayerState();
                if (state === 1) {
                    player.pauseVideo();
                    document.getElementById('play-pause').innerHTML = "▶";
                } else {
                    player.playVideo();
                    document.getElementById('play-pause').innerHTML = "⏸";
                    musicStarted = true;
                }
            }
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(pageId).classList.add('active-page');
            document.getElementById('nav-' + pageId).classList.add('active');
            window.scrollTo(0, 0);
        }

        function spawnHeart(e) {
            const heart = document.createElement('div');
            heart.className = 'click-heart';
            heart.innerHTML = '❤️';
            heart.style.left = e.pageX + 'px';
            heart.style.top = e.pageY + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1200);
        }

        function updateCounter() {
            const startDate = new Date("2024-01-01T00:00:00"); 
            const now = new Date();
            const diff = now - startDate;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days-counter").innerHTML = 
                `${days} Hari, ${hours}j ${minutes}m ${seconds}d`;
        }
        setInterval(updateCounter, 1000);
        updateCounter();

        // Guestbook logic dengan Local Storage (Menjaga agar pesan tidak hilang saat di-refresh)
        let messages = JSON.parse(localStorage.getItem('guestbook_messages')) || [
            { id: 'msg-default', name: 'frhan', text: 'I love u more 💖' }
        ];

        function renderMessages() {
            const daftar = document.getElementById("daftarPesan");
            if(daftar) {
                daftar.innerHTML = "";
                messages.forEach(msg => {
                    const boxPesan = document.createElement('div');
                    boxPesan.className = 'msg-box';
                    boxPesan.id = msg.id;
                    boxPesan.innerHTML = `
                        <span class="msg-name">${msg.name}</span>
                        <button class="btn-delete" onclick="hapusPesan(event, '${msg.id}')">🗑️</button>
                        <p class="msg-text">${msg.text}</p>
                    `;
                    daftar.appendChild(boxPesan);
                });
            }
        }

        function kirimPesan() {
            const nama = document.getElementById("inputNama").value.trim();
            const pesan = document.getElementById("inputPesan").value.trim();

            if (nama === "" || pesan === "") {
                alert("Harap isi nama dan pesan kamu terlebih dahulu! ✨");
                return;
            }

            const newId = 'msg-' + Date.now();
            const newMsg = { id: newId, name: nama, text: pesan };

            messages.unshift(newMsg);
            localStorage.setItem('guestbook_messages', JSON.stringify(messages));
            renderMessages();

            document.getElementById("inputNama").value = "";
            document.getElementById("inputPesan").value = "";
        }

        function hapusPesan(event, id) {
            event.stopPropagation();
            const element = document.getElementById(id);
            if (element) {
                element.classList.add('removing');
                setTimeout(() => {
                    messages = messages.filter(msg => msg.id !== id);
                    localStorage.setItem('guestbook_messages', JSON.stringify(messages));
                    renderMessages();
                }, 400);
            }
        }

        renderMessages();
    </script>
</body>
</html>
